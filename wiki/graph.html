<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Knowledge Base Graph</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0d1117;
    color: #c9d1d9;
    overflow: hidden;
  }

  #controls {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 10;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 16px;
    max-width: 280px;
  }

  #controls h2 {
    font-size: 14px;
    margin-bottom: 12px;
    color: #f0f6fc;
  }

  #controls label {
    display: block;
    font-size: 12px;
    margin-bottom: 4px;
    color: #8b949e;
  }

  #controls select, #controls input {
    width: 100%;
    padding: 6px 8px;
    margin-bottom: 10px;
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 4px;
    color: #c9d1d9;
    font-size: 12px;
  }

  .legend {
    margin-top: 12px;
    font-size: 11px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    margin-bottom: 4px;
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 8px;
    flex-shrink: 0;
  }

  #tooltip {
    position: fixed;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 300px;
    z-index: 20;
  }

  #tooltip .title {
    font-weight: 600;
    color: #f0f6fc;
    margin-bottom: 4px;
  }

  #tooltip .tags {
    color: #8b949e;
    margin-top: 4px;
  }

  #tooltip .tag {
    display: inline-block;
    background: #1f2937;
    border-radius: 3px;
    padding: 1px 6px;
    margin: 2px 2px 2px 0;
    font-size: 10px;
    color: #79c0ff;
  }

  #stats {
    position: fixed;
    bottom: 16px;
    left: 16px;
    font-size: 11px;
    color: #484f58;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="controls">
  <h2>Knowledge Graph</h2>

  <label for="filter-folder">Source folder</label>
  <select id="filter-folder">
    <option value="all">All folders</option>
  </select>

  <label for="filter-tag">Tag</label>
  <select id="filter-tag">
    <option value="all">All tags</option>
  </select>

  <label for="edge-type">Edge type</label>
  <select id="edge-type">
    <option value="all">All edges</option>
    <option value="related">Related only</option>
    <option value="source">Source only</option>
  </select>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#f78166"></div> Article</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3fb950"></div> Summary</div>
    <div class="legend-item"><div class="legend-dot" style="background:#30363d; border:1px dashed #484f58"></div> Filtered out</div>
  </div>
</div>

<div id="tooltip">
  <div class="title"></div>
  <div class="folder"></div>
  <div class="tags"></div>
</div>

<div id="stats"></div>

<svg id="graph"></svg>

    tooltip.style.opacity = 1;
    tooltip.style.left = (event.clientX + 16) + "px";
    tooltip.style.top = (event.clientY - 10) + "px";

    const connected = new Set();
    data.edges.forEach(e => {
      const sid = typeof e.source === "object" ? e.source.id : e.source;
      const tid = typeof e.target === "object" ? e.target.id : e.target;
      if (sid === d.id) connected.add(tid);
      if (tid === d.id) connected.add(sid);
    });
    connected.add(d.id);

    node.attr("opacity", n => connected.has(n.id) ? 1 : 0.15);
    label.attr("opacity", n => connected.has(n.id) ? 1 : 0.1);
    link.attr("opacity", e => {
      const sid = typeof e.source === "object" ? e.source.id : e.source;
      const tid = typeof e.target === "object" ? e.target.id : e.target;
      return (sid === d.id || tid === d.id) ? 1 : 0.05;

    label.attr("opacity", 1);
    link.attr("opacity", 1);

      .attr("y2", d => d.target.y);
    node
      .attr("cx", d => d.x)
      .attr("cy", d => d.y);
    label
      .attr("x", d => d.x)
      .attr("y", d => d.y);
  });

  const edgeCount = data.edges.length;
  document.getElementById("stats").textContent =
    `${articleCount} articles | ${summaryCount} summaries | ${edgeCount} edges | ${allTags.length} tags`;

  function applyFilters() {
    const folder = folderSelect.value;
    const tag = tagSelect.value;
    const edgeType = document.getElementById("edge-type").value;

    const activeNodes = new Set();
    data.nodes.forEach(n => {
      const folderMatch = folder === "all" || n.source_folder === folder;
      const tagMatch = tag === "all" || (n.tags || []).includes(tag);
      if (folderMatch && tagMatch) activeNodes.add(n.id);
    });

    node
      .attr("fill", d => {
        if (!activeNodes.has(d.id)) return "#21262d";
        return d.type === "summary" ? "#3fb950" : folderColors[d.source_folder];
      })
      .attr("opacity", d => activeNodes.has(d.id) ? 1 : 0.2)
      .attr("r", d => {
        if (!activeNodes.has(d.id)) return 4;
        return d.type === "summary" ? 10 : 7;
      });

    label.attr("opacity", d => activeNodes.has(d.id) ? 1 : 0.1);

    link
      .attr("opacity", d => {
        const sid = typeof d.source === "object" ? d.source.id : d.source;
        const tid = typeof d.target === "object" ? d.target.id : d.target;
        const nodesVisible = activeNodes.has(sid) && activeNodes.has(tid);
        const typeMatch = edgeType === "all" || d.type === edgeType;
        return (nodesVisible && typeMatch) ? 0.6 : 0.03;
      });
  }

  folderSelect.addEventListener("change", applyFilters);
  tagSelect.addEventListener("change", applyFilters);
  document.getElementById("edge-type").addEventListener("change", applyFilters);

  function dragstarted(event) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    event.subject.fx = event.subject.x;
    event.subject.fy = event.subject.y;
  }

  function dragged(event) {
    event.subject.fx = event.x;
    event.subject.fy = event.y;
  }

  function dragended(event) {
    if (!event.active) simulation.alphaTarget(0);
    event.subject.fx = null;
    event.subject.fy = null;
  }
})();
</script>
</body>
</html>
